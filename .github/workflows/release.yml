name: Release Wheels
on:
  workflow_dispatch:
    inputs:
      plan:
        description: Release plan JSON (generated by uvr release).
        type: string
        required: true
permissions:
  contents: write
  actions: read

jobs:
  # --------------------------------------------------------------------------
  # Validate
  # --------------------------------------------------------------------------
  uvr-validate:
    runs-on: [self-hosted, linux, x64]
    steps:
    - uses: actions/checkout@v6
    - id: setup-uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ fromJSON(inputs.plan).python_version }}
    - name: Reject releases from main
      if: github.ref == 'refs/heads/main'
      run: |
        echo "::error::Release must be dispatched from a release branch (e.g. release/v0.9.1), not main."
        exit 1
    - id: validate-plan
      name: Validate release plan
      env:
        UVR_PLAN: ${{ inputs.plan }}
      run: uv run uvr jobs validate

  # --------------------------------------------------------------------------
  # Check (lint, format, types, unit tests)
  # --------------------------------------------------------------------------
  check:
    needs: [uvr-validate]
    runs-on: [self-hosted, linux, x64]
    strategy:
      fail-fast: true
      matrix:
        task: [check, test-unit]
    steps:
    - uses: actions/checkout@v6
      with:
        clean: true
    - uses: astral-sh/setup-uv@v7
    - run: uv run poe ${{ matrix.task }}

  # --------------------------------------------------------------------------
  # Build
  # --------------------------------------------------------------------------
  uvr-build:
    needs: [uvr-validate, check]
    runs-on: ${{ matrix.runner }}
    if: ${{ always() && !failure() && !cancelled() && !contains(fromJSON(inputs.plan).skip, 'uvr-build') }}
    timeout-minutes: 60
    strategy:
      fail-fast: true
      matrix:
        runner: ${{ fromJSON(inputs.plan).build_matrix }}
    steps:
    - id: checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - id: setup-uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ fromJSON(inputs.plan).python_version }}

    - id: build
      name: Build packages
      env:
        GH_TOKEN: ${{ github.token }}
        UVR_PLAN: ${{ inputs.plan }}
        UVR_RUNNER: ${{ toJSON(matrix.runner) }}
      run: uv run uvr jobs build
    - id: upload
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ join(matrix.runner, '-') }}
        path: dist/*.whl
        if-no-files-found: error

  # --------------------------------------------------------------------------
  # Verify GPL licenses in QEMU wheels
  # --------------------------------------------------------------------------
  verify-licenses:
    needs: [uvr-validate, uvr-build]
    if: always() && !failure() && !cancelled() && !contains(fromJSON(inputs.plan).skip, 'verify-licenses')
    runs-on: [self-hosted, linux, x64]
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
    - uses: actions/download-artifact@v8
      with:
        pattern: wheels-*
        path: dist/
        merge-multiple: true
    - run: uv run --no-project scripts/ci/verify_licenses.py dist/*.whl

  # --------------------------------------------------------------------------
  # Test (integration tests — boot VMs from built wheels)
  # --------------------------------------------------------------------------
  test:
    needs: [uvr-build, verify-licenses]
    if: always() && !failure() && !cancelled() && !contains(fromJSON(inputs.plan).skip, 'test')
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        vm: [ubuntu, alpine]
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7

    - uses: actions/download-artifact@v8
      with:
        pattern: wheels-*
        path: dist/
        merge-multiple: true

    - name: KVM setup
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
          | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm || true

    - name: Install packages
      run: ${{ fromJSON(inputs.plan).test_install[matrix.vm] }}
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Run integration tests
      run: |
        uv run --no-project pytest \
          tests/integration/execution \
          tests/integration/mounts \
          tests/integration/network \
          tests/integration/checkpoint \
          -v --timeout=300
      env:
        QUICKSAND_TEST_VM: ${{ matrix.vm }}

  # --------------------------------------------------------------------------
  # Release — create per-package GitHub releases
  # --------------------------------------------------------------------------
  uvr-release:
    needs: [uvr-build, verify-licenses, test]
    runs-on: [self-hosted, linux, x64]
    if: ${{ always() && !failure() && !cancelled() && !contains(fromJSON(inputs.plan).skip, 'uvr-release') }}
    steps:
    - id: checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - id: setup-uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ fromJSON(inputs.plan).python_version }}
    - id: download
      name: Download wheels
      env:
        GH_TOKEN: ${{ github.token }}
        UVR_PLAN: ${{ inputs.plan }}
      run: uv run uvr jobs download
    - id: publish
      name: Tag and publish releases
      env:
        GH_TOKEN: ${{ github.token }}
        UVR_PLAN: ${{ inputs.plan }}
      run: uv run uvr jobs release

  # --------------------------------------------------------------------------
  # Publish — upload wheels to Azure Artifacts
  # --------------------------------------------------------------------------
  publish:
    needs: [uvr-validate, check, uvr-build, verify-licenses, uvr-release]
    if: ${{ always() && !failure() && !cancelled() && !contains(fromJSON(inputs.plan).skip, 'publish') }}
    runs-on: [self-hosted, linux, x64]
    steps:
    - uses: actions/checkout@v6
      with:
        clean: true
    - uses: astral-sh/setup-uv@v7

    - uses: actions/download-artifact@v8
      with:
        pattern: wheels-*
        path: dist/
        merge-multiple: true
        run-id: ${{ fromJSON(inputs.plan).reuse_run_id != '' && fromJSON(inputs.plan).reuse_run_id || github.run_id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish to Azure Artifacts
      run: uv run python scripts/ci/publish_azure.py
      env:
        UVR_PLAN: ${{ inputs.plan }}

  # --------------------------------------------------------------------------
  # Bump — post-release version bump
  # --------------------------------------------------------------------------
  uvr-bump:
    runs-on: [self-hosted, linux, x64]
    if: ${{ always() && !failure() && !cancelled() && !contains(fromJSON(inputs.plan).skip, 'uvr-bump') }}
    needs:
    - uvr-release
    steps:
    - id: checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - id: setup-uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ fromJSON(inputs.plan).python_version }}
    - id: finalize
      name: Finalize release
      env:
        UVR_PLAN: ${{ inputs.plan }}
      run: uv run uvr jobs bump
