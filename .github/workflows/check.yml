name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: {}
permissions:
  contents: read
jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [check, test:unit]
    steps:
      - uses: actions/checkout@v6
        with:
          clean: true
      - uses: astral-sh/setup-uv@v7
      - run: uv run poe ${{ matrix.task }}
