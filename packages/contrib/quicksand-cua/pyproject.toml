[project]
name = "quicksand-cua"
version = "0.2.7.dev0"
description = "Overlay image package for quicksand"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "quicksand-core>=0.10.3",
    "quicksand-agent>=0.3.7.dev0,<0.4.0",
]


[project.entry-points."quicksand.images"]
quicksand-cua = "quicksand_cua:image"


[build-system]
requires = ["hatchling", "quicksand-image-tools", "quicksand-core", "quicksand-agent>=0.3.7.dev0,<0.4.0", "quicksand-ubuntu", "quicksand-qemu", "quicksand-smb"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["quicksand_cua"]
artifacts = [
    "quicksand_cua/images/manifest.json",
    "quicksand_cua/images/overlays/*.qcow2",
]

[tool.hatch.build.targets.wheel.hooks.custom]

[tool.uv.sources]
quicksand-ubuntu = { workspace = true }
quicksand-core = { workspace = true }
quicksand-qemu = { workspace = true }
quicksand-agent = { workspace = true }
