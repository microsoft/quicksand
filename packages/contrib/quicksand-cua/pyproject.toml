[project]
name = "quicksand-cua"
version = "0.3.1"
description = "Overlay image package for quicksand"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = ["quicksand-core>=0.11.6,<0.12.0", "quicksand-agent>=0.4.1,<0.5.0"]


[project.entry-points."quicksand.images"]
quicksand-cua = "quicksand_cua:image"


[build-system]
requires = ["hatchling", "quicksand-image-tools>=0.5.0,<0.6.0", "quicksand-core>=0.11.0,<0.12.0", "quicksand-agent>=0.4.0,<0.5.0", "quicksand-ubuntu>=0.9.0,<0.10.0", "quicksand-qemu>=0.5.0,<0.6.0", "quicksand-smb>=0.4.0,<0.5.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["quicksand_cua"]
artifacts = [
    "quicksand_cua/images/manifest.json",
    "quicksand_cua/images/overlays/*.qcow2",
]

[tool.hatch.build.targets.wheel.hooks.custom]

[tool.uv.sources]
quicksand-ubuntu = { workspace = true }
quicksand-core = { workspace = true }
quicksand-qemu = { workspace = true }
quicksand-agent = { workspace = true }
