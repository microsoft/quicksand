[project]
name = "quicksand-ubuntu-desktop"
version = "0.9.0"
description = "Ubuntu 24.04 Desktop VM (Xfce4) for quicksand"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = ["quicksand-core>=0.11.5,<0.12.0", "quicksand-ubuntu>=0.9.0,<0.10.0"]

[dependency-groups]
dev = []

[build-system]
requires = ["hatchling", "quicksand-image-tools>=0.5.0,<0.6.0", "quicksand-core>=0.11.0,<0.12.0", "quicksand-ubuntu>=0.9.0,<0.10.0", "quicksand-qemu>=0.5.0,<0.6.0", "quicksand-smb>=0.4.0,<0.5.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["quicksand_ubuntu_desktop"]
artifacts = [
    "quicksand_ubuntu_desktop/images/manifest.json",
    "quicksand_ubuntu_desktop/images/overlays/*.qcow2",
]

[tool.hatch.build.targets.wheel.hooks.custom]

[tool.uv.sources]
quicksand-core = { workspace = true }
quicksand-qemu = { workspace = true }
quicksand-ubuntu = { workspace = true }

[project.entry-points."quicksand.images"]
ubuntu-desktop = "quicksand_ubuntu_desktop:image"
