[project]
name = "quicksand-ubuntu"
version = "0.9.2"
description = "Pre-built Ubuntu 24.04 VM image for quicksand"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = ["quicksand-core>=0.11.5,<0.12.0"]

[dependency-groups]
dev = ["quicksand-image-tools>=0.4.4"]

[build-system]
requires = ["hatchling", "quicksand-image-tools>=0.5.3,<0.6.0", "quicksand-core>=0.11.3,<0.12.0", "quicksand-qemu>=0.5.5.dev0,<0.6.0", "quicksand-smb>=0.4.3,<0.5.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["quicksand_ubuntu"]
artifacts = [
  "quicksand_ubuntu/images/*.qcow2",
  "quicksand_ubuntu/images/*.kernel",
  "quicksand_ubuntu/images/*.initrd",
]
exclude = [
  "quicksand_ubuntu/docker",
  "quicksand_ubuntu/docker-desktop",
]

[tool.hatch.build.targets.wheel.hooks.custom]

[tool.uv.sources]
quicksand-core = { workspace = true }
quicksand-qemu = { workspace = true }
# Build hook in hatch_build.py builds images if they don't exist

[project.entry-points."quicksand.images"]
ubuntu = "quicksand_ubuntu:image"
