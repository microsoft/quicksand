[project]
name = "quicksand-alpine-desktop"
version = "0.8.7.dev0"
description = "Minimal Alpine Linux desktop VM (Xfce4) for quicksand"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "quicksand-core>=0.10.3",
    "quicksand-alpine>=0.8.4",
]

[dependency-groups]
dev = []

[build-system]
requires = ["hatchling", "quicksand-image-tools", "quicksand-core", "quicksand-alpine", "quicksand-qemu", "quicksand-smb"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["quicksand_alpine_desktop"]
artifacts = [
    "quicksand_alpine_desktop/images/manifest.json",
    "quicksand_alpine_desktop/images/overlays/*.qcow2",
]

[tool.hatch.build.targets.wheel.hooks.custom]

[tool.uv.sources]
quicksand-core = { workspace = true }
quicksand-qemu = { workspace = true }
quicksand-alpine = { workspace = true }

[project.entry-points."quicksand.images"]
alpine-desktop = "quicksand_alpine_desktop:image"
