[project]
name = "quicksand-alpine"
version = "0.9.0"
description = "Pre-built Alpine Linux VM image for quicksand"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "quicksand-core>=0.11.0,<0.12.0",
]

[dependency-groups]
dev = ["quicksand-image-tools>=0.4.4"]

[build-system]
requires = ["hatchling", "quicksand-image-tools>=0.5.0,<0.6.0", "quicksand-core>=0.11.0,<0.12.0", "quicksand-qemu>=0.5.0,<0.6.0", "quicksand-smb>=0.4.0,<0.5.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["quicksand_alpine"]
artifacts = [
  "quicksand_alpine/images/*.qcow2",
  "quicksand_alpine/images/*.kernel",
  "quicksand_alpine/images/*.initrd",
]
exclude = [
  "quicksand_alpine/docker",
]

[tool.hatch.build.targets.wheel.hooks.custom]

[tool.uv.sources]
quicksand-core = { workspace = true }
quicksand-qemu = { workspace = true }
# Build hook in hatch_build.py builds images if they don't exist

[project.entry-points."quicksand.images"]
alpine = "quicksand_alpine:image"
