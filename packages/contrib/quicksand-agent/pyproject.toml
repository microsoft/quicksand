[project]
name = "quicksand-agent"
version = "0.3.7.dev0"
description = "Overlay image package for quicksand"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "quicksand-core>=0.10.3",
    "quicksand-ubuntu>=0.8.4",
]


[build-system]
requires = ["hatchling", "quicksand-image-tools", "quicksand-core", "quicksand-ubuntu", "quicksand-qemu", "quicksand-smb"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["quicksand_agent"]
artifacts = [
    "quicksand_agent/images/manifest.json",
    "quicksand_agent/images/overlays/*.qcow2",
]

[project.entry-points."quicksand.images"]
quicksand-agent = "quicksand_agent:image"


[tool.hatch.build.targets.wheel.hooks.custom]

[tool.uv.sources]
quicksand-core = { workspace = true }
quicksand-qemu = { workspace = true }
quicksand-ubuntu = { workspace = true }
