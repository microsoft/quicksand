[project]
name = "quicksand-agent"
version = "0.5.0a1"
description = "Overlay image package for quicksand"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = ["quicksand-core>=0.12.0a1,<0.13.0", "quicksand-ubuntu>=0.10.0a1,<0.11.0"]


[build-system]
requires = ["hatchling", "quicksand-image-tools>=0.6.0a1,<0.7.0", "quicksand-core>=0.12.0a1,<0.13.0", "quicksand-ubuntu>=0.10.0a1,<0.11.0", "quicksand-qemu>=0.6.0a1,<0.7.0", "quicksand-smb>=0.5.0a1,<0.6.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["quicksand_agent"]
artifacts = [
    "quicksand_agent/images/manifest.json",
    "quicksand_agent/images/overlays/*.qcow2",
]

[project.entry-points."quicksand.images"]
quicksand-agent = "quicksand_agent:image"


[tool.hatch.build.targets.wheel.hooks.custom]

[tool.uv.sources]
quicksand-core = { workspace = true }
quicksand-qemu = { workspace = true }
quicksand-ubuntu = { workspace = true }
