[project]
name = "quicksand-core"
version = "0.11.5"
description = "Core sandbox functionality for the quicksand VM harness."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = ["httpx>=0.27,<1.0", "pydantic>=2.0", "quicksand-smb>=0.4.5,<0.5.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["quicksand_core"]

[tool.uv.sources]
quicksand-smb = { workspace = true }
