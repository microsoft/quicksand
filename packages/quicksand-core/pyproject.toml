[project]
name = "quicksand-core"
version = "0.10.3.dev0"
description = "Core sandbox functionality for the quicksand VM harness."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "httpx>=0.27,<1.0",  # HTTP client for agent communication
    "pydantic>=2.0",  # Structured save manifests
    "quicksand-smb>=0.3.4.dev0",  # Pure-Python SMB3 server for host-guest mounts
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["quicksand_core"]

[tool.uv.sources]
quicksand-smb = { workspace = true }
