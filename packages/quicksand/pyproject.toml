[project]
name = "quick-sandbox"
version = "0.11.6"
description = "A VM harness for AI agents that works on macOS, Linux, and Windows."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = ["quicksand-core>=0.11.7,<0.12.0"]

[project.optional-dependencies]
qemu = ["quicksand-qemu>=0.4.3"]
ubuntu = ["quicksand-ubuntu>=0.7.2"]
alpine = ["quicksand-alpine>=0.7.2"]
alpine-desktop = ["quicksand-alpine-desktop>=0.7.5"]
ubuntu-desktop = ["quicksand-ubuntu-desktop>=0.7.5"]
agent = ["quicksand-agent>=0.3.7"]
cua = ["quicksand-cua>=0.2.7"]
dev = ["quicksand-image-tools>=0.3.2", "quicksand-overlay-scaffold>=0.1.4", "quicksand-base-scaffold>=0.1.3"]
all = [
    "quicksand-qemu>=0.4.3",
    "quicksand-ubuntu>=0.7.2",
    "quicksand-alpine>=0.7.2",
    "quicksand-alpine-desktop>=0.7.5",
    "quicksand-ubuntu-desktop>=0.7.5",
    "quicksand-image-tools>=0.3.2",
    "quicksand-agent>=0.3.7",
    "quicksand-cua>=0.2.7",
]

[project.scripts]
quicksand = "quicksand.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["quicksand"]

[tool.uv.sources]
quicksand-overlay-scaffold = { workspace = true }
quicksand-base-scaffold = { workspace = true }
quicksand-core = { workspace = true }
quicksand-qemu = { workspace = true }
quicksand-agent = { workspace = true }
quicksand-cua = { workspace = true }
