[project]
name = "quicksand-ubuntu-desktop"
version = "0.8.4"
description = "Ubuntu 24.04 Desktop VM (Xfce4) for quicksand"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "quicksand-core>=0.10.2",
    "quicksand-ubuntu>=0.8.4",
]

[dependency-groups]
dev = []

[build-system]
requires = ["hatchling", "quicksand-image-tools", "quicksand-core", "quicksand-ubuntu", "quicksand-qemu", "quicksand-smb"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["quicksand_ubuntu_desktop"]
artifacts = [
    "quicksand_ubuntu_desktop/images/manifest.json",
    "quicksand_ubuntu_desktop/images/overlays/*.qcow2",
]

[tool.hatch.build.targets.wheel.hooks.custom]

[tool.uv.sources]
quicksand-core = { workspace = true }
quicksand-qemu = { workspace = true }
quicksand-ubuntu = { workspace = true }

[project.entry-points."quicksand.images"]
ubuntu-desktop = "quicksand_ubuntu_desktop:image"
