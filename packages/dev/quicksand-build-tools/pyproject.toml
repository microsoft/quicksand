[project]
name = "quicksand-build-tools"
version = "0.5.0.dev0"
description = "Shared build utilities for bundling native binaries into quicksand wheels."
requires-python = ">=3.11"
license = "MIT"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["quicksand_build_tools"]
