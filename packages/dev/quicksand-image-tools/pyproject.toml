[project]
name = "quicksand-image-tools"
version = "0.4.4"
description = "Development tools for quicksand - build custom VM images from Dockerfiles"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "quicksand-core>=0.10.3",
]

[project.scripts]
quicksand-image-tools = "quicksand_image_tools.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["quicksand_image_tools"]
artifacts = [
  "quicksand_image_tools/templates/*",
  "quicksand_image_tools/quicksand-guest-agent/**/*",
]
exclude = [
  "quicksand_image_tools/quicksand-guest-agent/target",
]

[tool.uv.sources]
quicksand-core = { workspace = true }
