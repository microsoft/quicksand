[project]
name = "quicksand-gh-runners"
version = "0.1.0"
description = "CLI to manage persistent self-hosted GitHub Actions runner VMs on Azure."
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "azure-identity",
    "azure-mgmt-compute",
    "requests",
]

[project.scripts]
quicksand-runners = "quicksand_gh_runners.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["quicksand_gh_runners"]
