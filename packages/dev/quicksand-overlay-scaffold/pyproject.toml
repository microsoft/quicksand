[project]
name = "quicksand-overlay-scaffold"
version = "0.3.3"
description = "Overlay image package for quicksand"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = ["quicksand-core>=0.11.7,<0.12.0", "quicksand-ubuntu>=0.9.4,<0.10.0", "tomlkit>=0.13"]

[project.scripts]
quicksand-overlay-scaffold = "quicksand_overlay_scaffold.scaffold:main"

[project.entry-points."quicksand.images"]
quicksand-overlay-scaffold = "quicksand_overlay_scaffold:image"


[build-system]
requires = ["hatchling", "quicksand-image-tools>=0.5.1,<0.6.0", "quicksand-core>=0.11.1,<0.12.0", "quicksand-ubuntu>=0.9.1,<0.10.0", "quicksand-qemu>=0.5.1,<0.6.0", "quicksand-smb>=0.4.1,<0.5.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["quicksand_overlay_scaffold"]
artifacts = [
    "quicksand_overlay_scaffold/images/manifest.json",
    "quicksand_overlay_scaffold/images/overlays/*.qcow2",
]

[tool.hatch.build.targets.wheel.hooks.custom]

[tool.uv.sources]
quicksand-qemu = { workspace = true }
quicksand-smb = { workspace = true }
quicksand-core = { workspace = true }
quicksand-ubuntu = { workspace = true }
