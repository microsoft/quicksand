[project]
name = "quicksand-base-scaffold"
version = "0.3.0.dev0"
description = "Template base image package for quicksand"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "quicksand-core>=0.11.0.dev0,<0.12.0",
    "tomlkit>=0.13",
]

[project.scripts]
quicksand-base-scaffold = "quicksand_base_scaffold.scaffold:main"

[project.entry-points."quicksand.images"]
quicksand-base-scaffold = "quicksand_base_scaffold:image"


[build-system]
requires = ["hatchling", "quicksand-image-tools>=0.5.0.dev0,<0.6.0", "quicksand-core>=0.11.0.dev0,<0.12.0", "quicksand-qemu>=0.5.0.dev0,<0.6.0", "quicksand-smb>=0.4.0.dev0,<0.5.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["quicksand_base_scaffold"]
artifacts = [
    "quicksand_base_scaffold/images/*.qcow2",
    "quicksand_base_scaffold/images/*.kernel",
    "quicksand_base_scaffold/images/*.initrd",
    "quicksand_base_scaffold/docker/*",
]

[tool.hatch.build.targets.wheel.hooks.custom]

[tool.uv.sources]
quicksand-image-tools = { workspace = true }
quicksand-core = { workspace = true }
quicksand-qemu = { workspace = true }
