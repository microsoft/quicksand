[project]
name = "quicksand-qemu"
version = "0.5.12.dev0"
description = "Bundled QEMU binaries for the quicksand VM harness."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = []

[build-system]
requires = [
    "hatchling",
    "quicksand-build-tools>=0.5.3,<0.6.0",
    # auditwheel derives the wheel's manylinux tag from the bundled binaries'
    # glibc requirement on Linux. It pulls in pyelftools for ELF inspection.
    "auditwheel; sys_platform == 'linux'",
]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["quicksand_qemu"]

[tool.hatch.build.targets.wheel.hooks.custom]
# Build hook in hatch_build.py bundles QEMU binaries
